    const messageArea = document.getElementById('messageArea');
    const chipButtons = document.querySelectorAll('.chip-btn');
    const inputIds = ['textContent','urlValue','emailTo','emailSubject','emailBody','phoneValue','smsNumber','smsBody','wifiSsid','wifiPassword','wifiEncryption','wifiHidden','wechatId','wechatName','wechatLink','wechatNote','feishuTitle','feishuId','feishuLink','feishuNote','vcardName','vcardOrg','vcardTitle','vcardPhone','vcardEmail','vcardWebsite','vcardAddress','vcardNote','mecardName','mecardPhone','mecardEmail','mecardAddress','mecardNote','geoLat','geoLng','geoQuery','eventTitle','eventStart','eventEnd','eventLocation','eventDescription','whatsappNumber','whatsappText','errorLevel','qrSize','qrMargin','darkColor','lightColor'];
    let currentSvgMarkup = '';

    function escapeQrValue(value) {
      return String(value || '').replace(/([\\;,:"])/g, '\\$1');
    }

    function formatDateToIcs(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}Z$/, 'Z');
    }

    function setActiveGroup(type) {
      document.querySelectorAll('.field-group').forEach(group => group.classList.remove('active'));
      const target = document.getElementById('group-' + type);
      if (target) target.classList.add('active');
    }

    function setQrType(type) {
      qrType.value = type;
      typeTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.type === type));
      setActiveGroup(type);
      updatePayload();
    }

    function buildPayload() {
      switch (qrType.value) {
        case 'text':
          return document.getElementById('textContent').value.trim();
        case 'url':
          return document.getElementById('urlValue').value.trim();
        case 'email': {
          const to = document.getElementById('emailTo').value.trim();
          const params = [];
          const subject = document.getElementById('emailSubject').value.trim();
          const body = document.getElementById('emailBody').value.trim();
          if (!to) return '';
          if (subject) params.push('subject=' + encodeURIComponent(subject));
          if (body) params.push('body=' + encodeURIComponent(body));
          return 'mailto:' + to + (params.length ? '?' + params.join('&') : '');
        }
        case 'phone': {
          const phone = document.getElementById('phoneValue').value.trim();
          return phone ? 'tel:' + phone : '';
        }
        case 'sms': {
          const number = document.getElementById('smsNumber').value.trim();
          const body = document.getElementById('smsBody').value.trim();
          if (!number) return '';
          return body ? 'SMSTO:' + number + ':' + body : 'SMSTO:' + number;
        }
        case 'wifi': {
          const ssid = escapeQrValue(document.getElementById('wifiSsid').value.trim());
          const password = escapeQrValue(document.getElementById('wifiPassword').value.trim());
          const encryption = document.getElementById('wifiEncryption').value;
          const hidden = document.getElementById('wifiHidden').checked ? 'true' : 'false';
          return ssid ? 'WIFI:T:' + encryption + ';S:' + ssid + ';P:' + password + ';H:' + hidden + ';;' : '';
        }
        case 'wechat': {
          const link = document.getElementById('wechatLink').value.trim();
          const wechatId = document.getElementById('wechatId').value.trim();
          const name = document.getElementById('wechatName').value.trim();
          const note = document.getElementById('wechatNote').value.trim();
          if (link) return link;
          const lines = [
            name ? '微信昵称: ' + name : '',
            wechatId ? '微信号: ' + wechatId : '',
            note ? '说明: ' + note : ''
          ].filter(Boolean);
          return lines.join('\n');
        }
        case 'feishu': {
          const link = document.getElementById('feishuLink').value.trim();
          const title = document.getElementById('feishuTitle').value.trim();
          const id = document.getElementById('feishuId').value.trim();
          const note = document.getElementById('feishuNote').value.trim();
          if (link) return link;
          const lines = [
            title ? '飞书标题: ' + title : '',
            id ? '飞书 ID: ' + id : '',
            note ? '说明: ' + note : ''
          ].filter(Boolean);
          return lines.join('\n');
        }
        case 'vcard': {
          const lines = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            'FN:' + document.getElementById('vcardName').value.trim(),
            'ORG:' + document.getElementById('vcardOrg').value.trim(),
            'TITLE:' + document.getElementById('vcardTitle').value.trim(),
            'TEL:' + document.getElementById('vcardPhone').value.trim(),
            'EMAIL:' + document.getElementById('vcardEmail').value.trim(),
            'URL:' + document.getElementById('vcardWebsite').value.trim(),
            'ADR:;;' + document.getElementById('vcardAddress').value.trim(),
            'NOTE:' + document.getElementById('vcardNote').value.trim(),
            'END:VCARD'
          ];
          return lines.filter(line => ['BEGIN:VCARD','VERSION:3.0','END:VCARD'].includes(line) || !line.endsWith(':')).join('\n');
        }
        case 'mecard': {
          const parts = [
            'N:' + escapeQrValue(document.getElementById('mecardName').value.trim()),
            'TEL:' + escapeQrValue(document.getElementById('mecardPhone').value.trim()),
            'EMAIL:' + escapeQrValue(document.getElementById('mecardEmail').value.trim()),
            'ADR:' + escapeQrValue(document.getElementById('mecardAddress').value.trim()),
            'NOTE:' + escapeQrValue(document.getElementById('mecardNote').value.trim())
          ].filter(item => !item.endsWith(':'));
          return parts.length ? 'MECARD:' + parts.join(';') + ';;' : '';
        }
        case 'geo': {
          const lat = document.getElementById('geoLat').value.trim();
          const lng = document.getElementById('geoLng').value.trim();
          const query = document.getElementById('geoQuery').value.trim();
          if (!lat || !lng) return '';
          return query ? 'geo:' + lat + ',' + lng + '?q=' + encodeURIComponent(query) : 'geo:' + lat + ',' + lng;
        }
        case 'event': {
          const title = document.getElementById('eventTitle').value.trim();
          const start = formatDateToIcs(document.getElementById('eventStart').value);
          const end = formatDateToIcs(document.getElementById('eventEnd').value);
          if (!title || !start || !end) return '';
          return [
            'BEGIN:VEVENT',
            'SUMMARY:' + title,
            'DTSTART:' + start,
            'DTEND:' + end,
            'LOCATION:' + document.getElementById('eventLocation').value.trim(),
            'DESCRIPTION:' + document.getElementById('eventDescription').value.trim(),
            'END:VEVENT'
          ].join('\n');
        }
        case 'whatsapp': {
          const number = document.getElementById('whatsappNumber').value.trim().replace(/[^\d]/g, '');
          const text = document.getElementById('whatsappText').value.trim();
          if (!number && !text) return '';
          return 'https://wa.me/' + number + (text ? '?text=' + encodeURIComponent(text) : '');
        }
        default:
          return '';
      }
    }

    function showMessage(message, type) {
      messageArea.textContent = message;
      messageArea.className = 'p-3 rounded-md text-sm ' + (type === 'error' ? 'error-message' : 'success-message');
      messageArea.classList.remove('hidden');
    }

    function updatePayload() {
      payloadOutput.value = buildPayload();
    }

    function generateQrCode() {
      updatePayload();
      const payload = payloadOutput.value.trim();
      if (!payload) {
        currentSvgMarkup = '';
        qrPreview.innerHTML = '<p class="text-gray-400 text-sm text-center">请先填写有效内容</p>';
        showMessage('请先填写有效内容。', 'error');
        return;
      }
      try {
        const errorLevel = document.getElementById('errorLevel').value;
        const size = Number(document.getElementById('qrSize').value) || 320;
        const margin = Number(document.getElementById('qrMargin').value) || 2;
        const darkColor = document.getElementById('darkColor').value;
        const lightColor = document.getElementById('lightColor').value;
        const qr = qrcode(0, errorLevel);
        qr.addData(payload, 'Byte');
        qr.make();
        currentSvgMarkup = qr.createSvgTag({
          cellSize: Math.max(1, Math.floor(size / qr.getModuleCount())),
          margin: margin,
          scalable: true
        });

        const svgDoc = new DOMParser().parseFromString(currentSvgMarkup, 'image/svg+xml');
        const svg = svgDoc.documentElement;
        svg.setAttribute('width', String(size));
        svg.setAttribute('height', String(size));
        const rect = svg.querySelector('rect');
        if (rect) rect.setAttribute('fill', lightColor);
        svg.querySelectorAll('path').forEach(path => {
          const fill = path.getAttribute('fill');
          path.setAttribute('fill', fill === '#ffffff' ? lightColor : darkColor);
        });
        currentSvgMarkup = new XMLSerializer().serializeToString(svg);
        qrPreview.innerHTML = currentSvgMarkup;
        showMessage('二维码已生成。', 'success');
      } catch (error) {
        console.error(error);
        currentSvgMarkup = '';
        qrPreview.innerHTML = '<p class="text-red-500 text-sm text-center">二维码生成失败，请检查内容长度或格式。</p>';
        showMessage('二维码生成失败，请检查内容长度或格式。', 'error');
      }
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function downloadPng() {
      if (!currentSvgMarkup) {
        generateQrCode();
        if (!currentSvgMarkup) return;
      }
      const size = Number(document.getElementById('qrSize').value) || 320;
      const svgUrl = URL.createObjectURL(new Blob([currentSvgMarkup], { type: 'image/svg+xml;charset=utf-8' }));
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(svgUrl);
        canvas.toBlob(blob => {
          if (!blob) {
            showMessage('PNG 导出失败。', 'error');
            return;
          }
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'qrcode.png';
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
          showMessage('PNG 已下载。', 'success');
        }, 'image/png');
      };
      img.onerror = function() {
        URL.revokeObjectURL(svgUrl);
        showMessage('PNG 导出失败。', 'error');
      };
      img.src = svgUrl;
    }

    function fillExample(example) {
      chipButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.example === example));
      if (example === 'website') {
        qrType.value = 'url';
        document.getElementById('urlValue').value = 'https://taugin.github.io/tools/qrcode.html';
      } else if (example === 'wifi') {
        qrType.value = 'wifi';
        document.getElementById('wifiSsid').value = 'Office-Guest';
        document.getElementById('wifiPassword').value = 'Guest@2026';
        document.getElementById('wifiEncryption').value = 'WPA';
        document.getElementById('wifiHidden').checked = false;
      } else if (example === 'contact') {
        qrType.value = 'vcard';
        document.getElementById('vcardName').value = '张三';
        document.getElementById('vcardOrg').value = 'Taugin Studio';
        document.getElementById('vcardTitle').value = '前端工程师';
        document.getElementById('vcardPhone').value = '+8613812345678';
        document.getElementById('vcardEmail').value = 'zhangsan@example.com';
        document.getElementById('vcardWebsite').value = 'https://example.com';
        document.getElementById('vcardAddress').value = '上海市浦东新区张江高科技园区';
        document.getElementById('vcardNote').value = '欢迎联系合作。';
      } else if (example === 'event') {
        qrType.value = 'event';
        document.getElementById('eventTitle').value = '产品评审会议';
        document.getElementById('eventStart').value = '2026-03-26T14:00';
        document.getElementById('eventEnd').value = '2026-03-26T15:30';
        document.getElementById('eventLocation').value = '腾讯会议 123-456-789';
        document.getElementById('eventDescription').value = '讨论新工具页发布和 SEO 配置。';
      } else if (example === 'location') {
        qrType.value = 'geo';
        document.getElementById('geoLat').value = '31.2304';
        document.getElementById('geoLng').value = '121.4737';
        document.getElementById('geoQuery').value = '上海市人民广场';
      }
      setQrType(qrType.value);
      generateQrCode();
    }

    function clearAll() {
      inputIds.forEach(id => {
        const element = document.getElementById(id);
        if (!element) return;
        if (element.type === 'checkbox') {
          element.checked = false;
        } else if (id === 'errorLevel') {
          element.value = 'M';
        } else if (id === 'qrSize') {
          element.value = '320';
        } else if (id === 'qrMargin') {
          element.value = '2';
        } else if (id === 'darkColor') {
          element.value = '#111827';
        } else if (id === 'lightColor') {
          element.value = '#ffffff';
        } else {
          element.value = '';
        }
      });
      setQrType('text');
      payloadOutput.value = '';
      currentSvgMarkup = '';
      qrPreview.innerHTML = '<p class="text-gray-400 text-sm text-center">填写内容后生成二维码</p>';
      messageArea.classList.add('hidden');
      chipButtons.forEach((btn, index) => btn.classList.toggle('active', index === 0));
    }

    typeTabs.forEach(tab => {
      tab.addEventListener('click', function() {
        setQrType(tab.dataset.type);
      });
    });

    inputIds.forEach(id => {
      const element = document.getElementById(id);
      if (!element) return;
      element.addEventListener('input', updatePayload);
      element.addEventListener('change', updatePayload);
    });

    document.getElementById('generateBtn').addEventListener('click', generateQrCode);
    document.getElementById('downloadSvgBtn').addEventListener('click', function() {
      if (!currentSvgMarkup) generateQrCode();
      if (!currentSvgMarkup) return;
      downloadFile(currentSvgMarkup, 'qrcode.svg', 'image/svg+xml;charset=utf-8');
      showMessage('SVG 已下载。', 'success');
    });
    document.getElementById('downloadPngBtn').addEventListener('click', downloadPng);
    document.getElementById('copyPayloadBtn').addEventListener('click', async function() {
      updatePayload();
      if (!payloadOutput.value.trim()) {
        showMessage('没有可复制的编码内容。', 'error');
        return;
      }
      try {
        await navigator.clipboard.writeText(payloadOutput.value);
      } catch (error) {
        payloadOutput.select();
        document.execCommand('copy');
      }
      showMessage('编码内容已复制。', 'success');
    });
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    chipButtons.forEach(button => button.addEventListener('click', function() { fillExample(button.dataset.example); }));

    document.addEventListener('DOMContentLoaded', function() {
      if (window.localStorage) {
        try {
          const recentToolsData = localStorage.getItem('recentTools');
          let recentTools = recentToolsData ? JSON.parse(recentToolsData) : [];
          recentTools = recentTools.filter(id => id !== 'qrcode-generator');
          recentTools.unshift('qrcode-generator');
          if (recentTools.length > 6) recentTools = recentTools.slice(0, 6);
          localStorage.setItem('recentTools', JSON.stringify(recentTools));
        } catch (error) {
          console.error('Error recording tool usage:', error);
        }
      }
      setQrType('text');
      fillExample('website');
    });
  </script>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
